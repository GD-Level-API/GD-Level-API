name             = "gd-api"
main             = "src/worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Descomenta y ajustá cuando tengas el dominio listo en Cloudflare
# [[routes]]
# pattern  = "thumball.liamt.xyz/*"
# zone_name = "liamt.xyz"

[[kv_namespaces]]
binding = "CARD_CACHE"
id      = "79333153777345988879b240b0b8b1d0"

[[d1_databases]]
binding     = "DB"
database_name = "gd-comments"
database_id = "8b7a88a9-04d4-4306-bb1c-f3cc22c8c75d"

[triggers]
crons = ["0 * * * *"]

[[rules]]
type  = "Text"
globs = ["**/*.html", "**/*.svg"]

[[rules]]
type  = "CompiledWasm"
globs = ["**/*.wasm"]
